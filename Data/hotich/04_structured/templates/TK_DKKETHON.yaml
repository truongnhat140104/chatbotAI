  "notes": {
    "1": "Ghi rõ tên cơ quan đăng ký kết hôn.",
    "2": "Chỉ ghi trong trường hợp người có yêu cầu đăng ký hộ tịch chưa có/không cung cấp số định danh cá nhân/CCCD/thẻ căn cước/căn cước điện tử. Nếu phải cung cấp “Nơi cư trú” thì ghi theo thường trú; nếu không có thường trú thì ghi tạm trú; nếu không có cả hai thì ghi nơi ở hiện tại.",
