  "notes": {
    "1": "Ghi rõ tên cơ quan đăng ký khai sinh.",
    "2": "Chỉ ghi trong trường hợp người có yêu cầu đăng ký hộ tịch chưa có/không cung cấp số định danh cá nhân/CCCD/thẻ căn cước/căn cước điện tử; không cung cấp đầy đủ thông tin ngày, tháng, năm sinh. Nếu phải cung cấp “Nơi cư trú” thì ghi theo thường trú; nếu không có thường trú thì ghi tạm trú; nếu không có cả hai thì ghi nơi ở hiện tại.",
    "3": "Ghi số định danh cá nhân/CCCD/thẻ căn cước (ví dụ: CCCD số ... do ... cấp ngày ...). Nếu không có thì ghi giấy tờ hợp lệ thay thế (hộ chiếu...).",
    "4": "Nếu sinh tại cơ sở y tế: ghi rõ tên cơ sở y tế và địa chỉ. Nếu sinh ngoài cơ sở y tế: ghi địa danh 02 cấp hành chính (xã, tỉnh) nơi sinh.",
    "5": "Ghi đầy đủ ngày, tháng sinh của cha, mẹ (nếu có).",
    "6": "Đánh dấu X nếu có yêu cầu cấp bản sao và ghi rõ số lượng."
  },
